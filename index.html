<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Ashoka Archives: The Maze</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #08080f;
      font-family: monospace;
      color: #c8a84b;
    }

    /* Fullscreen canvas */
    #gc {
      width: 100vw;
      height: 100vh;
      display: block;
      image-rendering: pixelated;
      background: #08080f;
    }

    /* HUD overlay */
    #hud {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 34px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 12px;
      box-sizing: border-box;
      background: rgba(13, 13, 26, 0.88);
      border-bottom: 1px solid rgba(200, 168, 75, 0.5);
      font-size: 12px;
      z-index: 10;
      user-select: none;
      pointer-events: none;
    }

    /* Start button overlay */
    #start {
      position: fixed;
      top: 44px;
      left: 12px;
      z-index: 11;
      padding: 10px 14px;
      background: rgba(8,8,15,0.65);
      border: 1px solid #c8a84b;
      color: #c8a84b;
      font-weight: bold;
      cursor: pointer;
      pointer-events: auto;
    }
    #start:hover {
      background: #c8a84b;
      color: #08080f;
    }
  </style>
</head>
<body>
  <div id="hud">
    <span id="h-left">LV1 · FUMIGATION</span>
    <span id="h-mid">TIME: 0s</span>
    <span id="h-right">LIVES: ♥♥♥</span>
  </div>

  <button id="start" onclick="startGame()">START</button>
  <canvas id="gc"></canvas>

  <script type="module" src="./game.js"></script>
</body>
</html>
