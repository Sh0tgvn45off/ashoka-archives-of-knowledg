<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Game with Fog Overlay</title>
    <style>
        /* Fog overlay styles */
        #fog {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 255, 0, 0.3);
            pointer-events: none;
            display: none;
        }
    </style>
</head>
<body>
    <div id="game"></div>
    <div id="fog"></div>
    <script type="module" src="game.js"></script>
</body>
</html>
